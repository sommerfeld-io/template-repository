---
name: 'Housekeeping: Issues in Project'

on:
  issues:
    types:
      - labeled
      - unlabeled

jobs:
  housekeeping-project:
    uses: sommerfeld-io/.github/.github/workflows/housekeeping-project.yml@main
    secrets:
      GH_TOKEN_REPO_AND_PROJECT: ${{ secrets.GH_TOKEN_REPO_AND_PROJECT }}
    permissions:
      contents: read
      issues: read
      repository-projects: write

---
name: "Pipeline: Release"

on:
  release:
    types: [created]

env:
  IMAGE_TAG_RC: rc
  IMAGE_TAG_LATEST: latest
  IMAGE_NAME: template-repository
  DOCS_PAGES_ARTIFACT: docs-page

jobs:

  update-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ github.ref }}
      - name: Add closed issues and PRs to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CURRENT_TAG="${{ github.event.release.tag_name }}"

          # Get the previous release tag (excluding the current one)
          PREV_TAG=$(gh release list --limit 50 --json tagName --jq '.[].tagName' \
            | grep -v "^${CURRENT_TAG}$" | head -1 || echo "")

          if [[ -n "$PREV_TAG" ]]; then
            PREV_DATE=$(gh release view "$PREV_TAG" --json publishedAt \
              --jq '.publishedAt | split("T")[0]')
          else
            PREV_DATE="1970-01-01"
          fi

          # List closed issues since previous release (excludes PRs)
          ISSUES=$(gh issue list --state closed \
            --search "closed:>${PREV_DATE}" \
            --limit 100 \
            --json number,title,url \
            --jq '.[] | "- [#\(.number) \(.title)](\(.url))"' || echo "")

          # List closed PRs since previous release
          PRS=$(gh pr list --state closed \
            --search "closed:>${PREV_DATE}" \
            --limit 100 \
            --json number,title,url \
            --jq '.[] | "- [#\(.number) \(.title)](\(.url))"' || echo "")

          # Build section
          SECTION=$'### Closed Issues and Pull Requests\n'
          if [[ -n "$ISSUES" || -n "$PRS" ]]; then
            [[ -n "$ISSUES" ]] && SECTION+="${ISSUES}"$'\n'
            [[ -n "$PRS" ]] && SECTION+="${PRS}"$'\n'
          else
            SECTION+="_No issues or pull requests were closed since the last release._"
          fi

          # Append section to existing release body
          CURRENT_BODY=$(gh release view "$CURRENT_TAG" --json body --jq '.body')
          NEW_BODY="${CURRENT_BODY}"$'\n\n'"${SECTION}"

          gh release edit "$CURRENT_TAG" --notes "${NEW_BODY}"
        shell: bash

  docs-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{github.ref}}
      - name: Build docs page
        run: docker compose up docs-build
        shell: bash
      - name: List contents
        run: ls -alF target/docs/site
        shell: bash
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          name: ${{ env.DOCS_PAGES_ARTIFACT }}
          path: target/docs/site

  docs-deploy:
    runs-on: ubuntu-latest
    needs: docs-build
    permissions:
      contents: read
      pages: write
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
        with:
          artifact_name: ${{ env.DOCS_PAGES_ARTIFACT }}

  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
